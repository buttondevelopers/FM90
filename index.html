<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Magistral · Preparados</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{--green:#2F6933;--green-d:#244F27;--green-l:#E7EFE7;--dark:#1C1C1E;--gray:#8E8E93;
    --bg:#F2F1ED;--card:#FFF;--line:#E4E3DE;--line2:#EFEEEA;--blue:#0760A4;--amber:#C8742B;--red:#C0392B;
    --r:15px;--sh:0 1px 2px rgba(0,0,0,.04),0 10px 30px -18px rgba(0,0,0,.22);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--dark);line-height:1.45;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:16px;color:var(--dark)}
  .hidden{display:none!important}
  .app{max-width:540px;margin:0 auto;min-height:100vh;background:var(--bg);padding-bottom:40px}

  .head{background:var(--card);border-bottom:1px solid var(--line);padding:14px 18px;position:sticky;top:0;z-index:20}
  .brand{display:flex;flex-direction:column;align-items:flex-start;gap:5px;margin-bottom:12px}
  .logoimg{height:42px;width:auto;display:block}
  .brand .sb{font-size:11.5px;color:var(--gray);font-weight:600}
  .seg{display:flex;background:var(--bg);border-radius:11px;padding:3px}
  .seg button{flex:1;padding:8px 4px;border-radius:9px;font-size:12px;font-weight:600;color:var(--gray);display:flex;align-items:center;justify-content:center;gap:5px;transition:.18s;white-space:nowrap}
  .seg button svg{width:14px;height:14px;flex-shrink:0}
  .seg button.on{background:var(--card);color:var(--green);box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .seg button.on.lab{color:var(--blue)}
  .seg button.on.admin{color:var(--dark)}

  .ctx{padding:14px 18px 0}
  .selrow{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px;display:grid;grid-template-columns:1fr 1fr;gap:12px;box-shadow:var(--sh)}
  .selrow .lbl{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gray);margin-bottom:5px;display:block}
  .selwrap{position:relative}
  .sel{width:100%;appearance:none;border:1px solid var(--line);border-radius:9px;padding:9px 30px 9px 11px;background:var(--card);outline:none;font-size:14px;font-weight:600}
  .selwrap::after{content:"";position:absolute;right:12px;top:50%;width:7px;height:7px;border-right:2px solid var(--gray);border-bottom:2px solid var(--gray);transform:translateY(-70%) rotate(45deg);pointer-events:none}

  .topnav{display:flex;align-items:center;gap:12px;padding:14px 18px 0}
  .back{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--green)}
  .back svg{width:17px;height:17px}
  .topnav .tt{font-weight:700;font-size:16px}
  .labtabs{display:flex;gap:8px;padding:14px 18px 0;overflow-x:auto;scrollbar-width:none}
  .labtabs::-webkit-scrollbar{display:none}
  .ltab{white-space:nowrap;padding:9px 15px;border-radius:999px;font-size:13.5px;font-weight:600;background:var(--card);border:1px solid var(--line);color:var(--dark)}
  .ltab.on{background:var(--dark);color:#fff;border-color:var(--dark)}
  .ltab .dot{background:var(--amber);color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:99px;display:inline-grid;place-items:center;margin-left:5px;padding:0 5px}

  .main{padding:16px 18px 0}
  .h1{font-size:23px;font-weight:700;letter-spacing:-.02em}
  .sub{color:var(--gray);font-size:14px;margin:2px 0 18px}

  /* stepper */
  .steps{display:flex;align-items:center;margin:16px 0 22px}
  .step{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
  .step .c{width:30px;height:30px;border-radius:99px;display:grid;place-items:center;font-size:13px;font-weight:700;border:2px solid var(--line);color:var(--gray);background:var(--card)}
  .step.done .c{background:var(--green);border-color:var(--green);color:#fff}
  .step.cur .c{background:var(--green);border-color:var(--green);color:#fff}
  .step .l{font-size:11px;font-weight:600;color:var(--gray)}
  .step.cur .l,.step.done .l{color:var(--dark)}
  .stepline{flex:1;height:2px;background:var(--line);margin:0 4px;margin-bottom:20px}
  .stepline.done{background:var(--green)}

  /* menu cards (home) */
  .qh{font-size:22px;font-weight:700;letter-spacing:-.02em;margin:6px 0 2px}
  .acard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;display:flex;align-items:center;gap:15px;margin-bottom:12px;box-shadow:var(--sh);transition:.14s}
  .acard:active{transform:scale(.99)}
  .acard .ic{width:46px;height:46px;border-radius:12px;background:var(--green-l);display:grid;place-items:center;flex-shrink:0;color:var(--green)}
  .acard .ic svg{width:23px;height:23px}
  .acard .tt{font-size:17px;font-weight:700}
  .acard .ds{font-size:13px;color:var(--gray);margin-top:1px}
  .acard .ch{margin-left:auto;color:var(--gray)}
  .mini{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:2px}
  .mcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--sh)}
  .mcard svg{width:21px;height:21px;color:var(--green);margin-bottom:8px}
  .mcard .tt{font-weight:700;font-size:15px}.mcard .ds{font-size:12.5px;color:var(--gray)}
  .note{background:var(--green-l);border-radius:13px;padding:14px 16px;font-size:13px;color:var(--green-d);margin-top:16px;display:flex;gap:9px}
  .note svg{width:18px;height:18px;flex-shrink:0;color:var(--green)}

  /* forms */
  .group{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:4px 16px;margin-bottom:14px;box-shadow:var(--sh)}
  .fld{padding:13px 0;border-bottom:1px solid var(--line2)}.fld:last-child{border-bottom:none}
  .lbl{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--gray);margin-bottom:7px;display:block}
  .inp,.ta{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:var(--card);outline:none;transition:.15s}
  .inp:focus,.ta:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(14,123,70,.12)}
  .ta{resize:vertical;min-height:70px;font-size:15px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:15px;border-radius:13px;font-size:16px;font-weight:700;transition:.16s;margin-bottom:12px}
  .btn:active{transform:scale(.985)}
  .btn-add{display:inline-flex;align-items:center;justify-content:center;gap:7px;width:auto;padding:11px 18px;border-radius:11px;font-size:14px;font-weight:700;background:var(--green);color:#fff;margin:6px 0 12px;box-shadow:0 8px 18px -10px rgba(14,123,70,.7)}
  .btn-add svg{width:17px;height:17px}
  .btn-add:active{transform:scale(.98)}
  #login{position:fixed;inset:0;z-index:200;background:linear-gradient(160deg,#ffffff,#eef3ee);display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{width:100%;max-width:380px;background:#fff;border-radius:24px;padding:30px 24px;box-shadow:0 30px 60px -28px rgba(0,0,0,.28);text-align:center}
  .login-card img{height:52px;margin-bottom:4px}
  .login-card .lt{font-weight:800;font-size:19px;color:var(--ink);margin:12px 0 2px}
  .login-card .ls{color:var(--muted);font-size:13px;margin-bottom:18px}
  .login-card label{display:block;text-align:left;font-size:12px;font-weight:700;color:var(--muted);margin:13px 0 5px}
  .login-card .sel,.login-card input{width:100%;padding:13px 14px;border:1.5px solid #e3e6e3;border-radius:13px;font-size:15px;background:#fafbfa;box-sizing:border-box;color:var(--ink)}
  .login-card .btn{margin-top:18px}
  .login-hint{margin-top:16px;font-size:11.5px;color:var(--muted);background:#f4f6f4;border-radius:11px;padding:10px 12px;line-height:1.6;text-align:left}
  .login-warn{margin-top:10px;font-size:11px;color:#8a5a00;background:#fff7e6;border:1px solid #ffe2a8;border-radius:10px;padding:9px 11px;text-align:left;line-height:1.5}
  #userbar{display:flex;align-items:center;gap:10px;width:100%}
  #userbar .ua{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:14px;flex-shrink:0}
  #userbar .un{font-weight:700;font-size:14.5px;color:var(--ink);line-height:1.15}
  #userbar .ur{font-size:11.5px;color:var(--muted)}
  #userbar .lo{margin-left:auto;border:1.5px solid #e3e6e3;background:#fff;border-radius:10px;padding:8px 12px;font-size:12.5px;font-weight:700;color:var(--muted);display:inline-flex;align-items:center;gap:6px;cursor:pointer}
  #userbar .lo svg{width:15px;height:15px}
  .btn-primary{background:var(--green);color:#fff;box-shadow:0 10px 22px -10px rgba(14,123,70,.8)}
  .btn-dark{background:var(--dark);color:#fff}
  .btn-ghost{background:var(--card);border:1px solid var(--line);color:var(--dark)}
  .btn-red{background:#FBE9E6;color:var(--red)}
  .found{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--green);background:var(--green-l);padding:5px 10px;border-radius:999px;margin-top:8px}

  /* urgencia cards */
  .ucard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:17px;display:flex;align-items:center;gap:14px;margin-bottom:12px;box-shadow:var(--sh);transition:.14s}
  .ucard:active{transform:scale(.99)}
  .ucard.sel{border-color:var(--green);box-shadow:0 0 0 3px rgba(14,123,70,.14)}
  .ucard .d{width:18px;height:18px;border-radius:99px;flex-shrink:0}
  .ucard .tt{font-weight:700;font-size:16px}.ucard .ds{font-size:13px;color:var(--gray)}
  .ucard .ch{margin-left:auto;color:var(--gray)}

  /* dropzone */
  .dz{border:2px dashed var(--green);border-radius:var(--r);padding:30px 20px;text-align:center;background:var(--green-l)}
  .dz svg{width:34px;height:34px;color:var(--green);margin-bottom:8px}
  .dz .t{font-weight:700;font-size:16px;color:var(--green)}.dz .s{font-size:13px;color:var(--gray)}
  .pv{position:relative;border-radius:var(--r);overflow:hidden;border:1px solid var(--line)}
  .pv img{width:100%;max-height:300px;object-fit:contain;background:#1c1c1e;display:block}
  .pv .rm{position:absolute;top:9px;right:9px;background:rgba(0,0,0,.7);color:#fff;padding:7px 11px;border-radius:9px;font-size:13px;font-weight:600}

  /* médico search list */
  .search{display:flex;align-items:center;gap:9px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);margin-bottom:12px}
  .search svg{width:18px;height:18px;color:var(--gray)}.search input{border:none;outline:none;width:100%;background:none}
  .medc{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px;display:flex;align-items:center;gap:13px;margin-bottom:10px;box-shadow:var(--sh)}
  .medc.sel{border-color:var(--green);box-shadow:0 0 0 3px rgba(14,123,70,.14)}
  .medc .ic{width:38px;height:38px;border-radius:10px;background:var(--green-l);display:grid;place-items:center;color:var(--green);flex-shrink:0}
  .medc .ic svg{width:19px;height:19px}
  .medc .nm{font-weight:700;font-size:15.5px}
  .medc .esp{font-size:13px;color:var(--green);font-weight:600}
  .medc .mat{font-size:12.5px;color:var(--gray);margin-top:2px}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px;background:#ECECEA;color:#555;margin-right:5px;vertical-align:middle}
  .ch{margin-left:auto;color:var(--gray)}
  .pill{font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:999px;background:#ECECEA;color:var(--gray);margin-left:auto;flex-shrink:0;border:1px solid transparent}
  .pill.on{background:var(--green-l);color:var(--green)}

  /* lista */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 9px;box-shadow:var(--sh)}
  .stat .n{font-size:23px;font-weight:700}.stat .l{font-size:10.5px;color:var(--gray);margin-top:2px;font-weight:600;line-height:1.2}
  .stat .dt{width:8px;height:8px;border-radius:99px;display:inline-block;margin-right:5px}
  .fr{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}.fr::-webkit-scrollbar{display:none}
  .fbtn{white-space:nowrap;padding:7px 13px;border:1px solid var(--line);border-radius:999px;font-size:12.5px;font-weight:600;background:var(--card);color:var(--gray)}
  .fbtn.on{background:var(--dark);color:#fff;border-color:var(--dark)}
  .item{display:flex;gap:13px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
  .item:active{transform:scale(.99)}
  .ithumb{width:46px;height:46px;border-radius:11px;flex-shrink:0;object-fit:cover;background:var(--bg);border:1px solid var(--line)}
  .iicon{width:46px;height:46px;border-radius:11px;flex-shrink:0;display:grid;place-items:center;background:#EAF3FA;color:var(--blue)}
  .iicon svg{width:21px;height:21px}
  .imain{flex:1;min-width:0}.imain .tt{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .imain .ss{font-size:13px;color:var(--gray);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .imeta{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:5px}
  .udot{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700}
  .chip{font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;white-space:nowrap}
  .chip.pendiente{background:#F7E9D6;color:var(--amber)}.chip.aceptado{background:#DEEEF4;color:#2C6E8F}.chip.en_preparacion{background:#FBF0DA;color:#B5791C}
  .chip.listo{background:#DCEFE0;color:#2F7D4F}.chip.entregado{background:#ECECEF;color:#6B7670}.chip.rechazado{background:#FBE3E0;color:var(--red)}
  .empty{text-align:center;padding:50px 18px;color:var(--gray)}.empty svg{width:40px;height:40px;opacity:.4;margin-bottom:10px}.empty .t{font-weight:700;color:var(--dark);font-size:16px}

  /* drawer */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:60;display:none}.ov.on{display:block}
  .dw{position:fixed;left:50%;bottom:0;width:100%;max-width:540px;transform:translateX(-50%) translateY(100%);background:var(--bg);z-index:61;border-radius:20px 20px 0 0;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 -10px 40px rgba(0,0,0,.3)}
  .dwh{padding:18px 20px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);background:var(--card);border-radius:20px 20px 0 0}
  .dwh h3{font-size:19px;font-weight:700;flex:1}
  .xbtn{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--bg)}.xbtn svg{width:17px;height:17px}
  .dwb{padding:20px;padding-bottom:max(24px,env(safe-area-inset-bottom,0px));overflow-y:scroll;-webkit-overflow-scrolling:touch;min-height:0;flex:1;overscroll-behavior:contain}
  .sugg-list{background:#fff;border:1.5px solid var(--line);border-radius:11px;box-shadow:0 8px 22px -8px rgba(0,0,0,.18);overflow:hidden;margin-top:4px;position:relative;z-index:10}
  .sugg-item{padding:12px 15px;font-size:14px;color:var(--ink);border-bottom:1px solid var(--line);cursor:pointer;line-height:1.3}
  .sugg-item:last-child{border-bottom:none}
  .sugg-item:active{background:#f0f5f0}
  .urg-badge{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:13px;font-size:13.5px;font-weight:700;margin-bottom:14px;letter-spacing:.01em}
  .item.open{border-radius:var(--r) var(--r) 0 0!important;border-bottom-color:transparent!important;margin-bottom:0!important}
  .acc-detail{background:var(--card);border:1px solid var(--line);border-top:none;border-radius:0 0 var(--r) var(--r);padding:14px 16px 20px;margin-bottom:12px;animation:accIn .22s ease}
  @keyframes accIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .acc-img{width:100%;border-radius:10px;max-height:230px;object-fit:contain;background:#1c1c1e;margin-bottom:12px;display:block}
  .acc-act{margin-top:14px;display:flex;flex-direction:column;gap:8px}
  .rk.open{background:var(--green-l);border-color:var(--green)}
  .dimg{width:100%;border-radius:var(--r);border:1px solid var(--line);background:#1c1c1e;max-height:280px;object-fit:contain;margin-bottom:16px;display:block}
  .prepbox{background:var(--green-l);border:1px solid rgba(14,123,70,.2);border-radius:var(--r);padding:14px;margin-bottom:6px}
  .prepbox .pl{font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--green);margin-bottom:5px}
  .prepbox .pt{font-size:16px;font-weight:600}
  .kv{display:grid;grid-template-columns:118px 1fr;gap:7px 14px;font-size:14.5px;margin:16px 0}.kv dt{color:var(--gray);font-weight:600}.kv dd{font-weight:600}
  .secl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--gray);margin:18px 0 10px}
  .flow{display:flex;gap:7px;flex-wrap:wrap}
  .sbtn{flex:1;min-width:96px;padding:11px;border-radius:11px;border:1px solid var(--line);background:var(--card);font-size:13px;font-weight:700;color:var(--gray)}.sbtn.cur{background:var(--green);color:#fff;border-color:var(--green)}
  .tl{border-left:2px solid var(--line);margin-left:6px;padding-left:16px}
  .tli{position:relative;padding-bottom:14px}.tli::before{content:"";position:absolute;left:-23px;top:3px;width:10px;height:10px;border-radius:99px;background:var(--green);border:2px solid var(--bg)}
  .tli .a{font-weight:700;font-size:13.5px}.tli .b{font-size:12px;color:var(--gray)}
  .reason{background:#FBE3E0;border:1px solid rgba(192,57,43,.3);border-radius:12px;padding:13px;font-size:14px;color:#8a2c20;margin-bottom:14px}
  .reason b{display:block;font-size:11px;letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}

  /* ranking */
  .rk{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--sh)}
  .rk .top{display:flex;align-items:center;gap:11px}
  .rk .av{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
  .rk .nm{font-weight:700;font-size:15px}.rk .es{font-size:12.5px;color:var(--gray)}
  .rk .cnt{margin-left:auto;font-weight:700;font-size:15px;color:var(--green)}
  .rk .bar{height:7px;border-radius:99px;background:var(--bg);margin-top:10px;overflow:hidden}.rk .bar i{display:block;height:100%;background:var(--green);border-radius:99px}

  #toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);z-index:90;background:var(--dark);color:#fff;padding:13px 18px;border-radius:13px;font-size:14.5px;font-weight:600;display:flex;align-items:center;gap:9px;opacity:0;pointer-events:none;box-shadow:0 12px 30px rgba(0,0,0,.3)}
  #toast svg{width:18px;height:18px;color:#5FD08A}
</style>
</head>
<body>

<script>
/* ===== STORAGE ===== */
const Store=(()=>{const mem={};const ws=(window.storage&&typeof window.storage.get==='function')?window.storage:null;
  async function get(k){if(ws){try{const r=await ws.get(k,true);return r?r.value:null}catch(e){return null}}try{const v=localStorage.getItem(k);return v===null?(k in mem?mem[k]:null):v}catch(e){return k in mem?mem[k]:null}}
  async function set(k,v){if(ws){try{await ws.set(k,v,true);return}catch(e){}}try{localStorage.setItem(k,v);return}catch(e){mem[k]=v}}
  return{async getJSON(k,d){const v=await get(k);if(v==null)return d;try{return JSON.parse(v)}catch(e){return d}},async setJSON(k,o){await set(k,JSON.stringify(o))},get,set};
})();
const K={ORD:'mg3:orders',PAC:'mg3:pac',MED:'mg3:med',SUC:'mg3:suc',VEND:'mg3:vend',CFG:'mg3:cfg',USERS:'mg3:users',PRODS:'mg3:prods',IMG:id=>'mg3:img:'+id};

/* ===== CONST ===== */
const SUCURSALES=['Sucursal Haedo','Moreno 90 - Central','Sucursal Ramos Mejía','Sucursal Morón'];
const VENDEDORES=['Carla','Martín','Lucía'];
const LAB_OPS=['Lab · Dr. Sosa','Lab · Romina','Lab · Diego'];
const PROVINCIAS=['Buenos Aires','CABA','Santa Fe','Córdoba','Mendoza','Otra'];
const URG={alta:{l:'Alta',d:'Necesario para hoy / mañana',c:'#C0392B'},media:{l:'Media',d:'En 2-3 días',c:'#C8742B'},baja:{l:'Baja',d:'Reposición normal de stock',c:'#2F7D4F'}};
const ESTADOS={pendiente:'Pendiente',aceptado:'Aceptado',en_preparacion:'En preparación',listo:'Listo',entregado:'Entregado',rechazado:'Rechazado'};
const AVCOL=['#0E7B46','#C8742B','#2C6E8F','#7A4B8A','#A8412E'];

/* ===== STATE ===== */
const state={session:null,role:'farma',openId:null,screen:'home',sucursal:SUCURSALES[0],vendedor:'Carla',op:'Lab · Dr. Sosa',filter:'todos',
  wped:{step:0,urgencia:null,items:[],obs:''},
  wrec:{step:0,img:null,medicoId:null,medQ:'',pacQ:'',prod:'',pres:'',cant:1,obs:''},
  rep:{desde:'',hasta:'',medId:null}};
let orders=[],pacientes=[],medicos=[],sucursalesList=[],vendedoresList=[],usuarios=[],productos=[],config={};
const sucAct=()=>sucursalesList.filter(s=>s.activa);
const vendAct=()=>vendedoresList.filter(v=>v.activo);
const usuAct=()=>usuarios.filter(u=>u.activo);

/* ===== HELPERS ===== */
const $=s=>document.querySelector(s);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const fmtDate=t=>new Date(t).toLocaleString('es-AR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
const fmtD=t=>new Date(t).toLocaleDateString('es-AR');
const inicial=n=>(n||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
const avc=s=>AVCOL[[...(s||'x')].reduce((a,c)=>a+c.charCodeAt(0),0)%AVCOL.length];
const codigo=o=>(o.tipo==='receta'?'RX-':'RP-')+o.id.slice(0,6).toUpperCase();
const resumen=o=>o.tipo==='receta'?(o.prod||'Receta magistral'):(o.items||[]).map(i=>i.producto).join(', ');
function toast(m){$('#tmsg').textContent=m;gsap.fromTo('#toast',{y:20,opacity:0},{y:0,opacity:1,duration:.32,ease:'back.out(1.6)',onComplete:()=>gsap.to('#toast',{y:20,opacity:0,delay:1.9,duration:.3})});}
async function loadAll(){
  orders=await Store.getJSON(K.ORD,[]);pacientes=await Store.getJSON(K.PAC,[]);medicos=await Store.getJSON(K.MED,[]);
  sucursalesList=await Store.getJSON(K.SUC,null);
  if(!sucursalesList){sucursalesList=SUCURSALES.map(n=>({id:uid(),nombre:n,activa:true}));await Store.setJSON(K.SUC,sucursalesList);}
  vendedoresList=await Store.getJSON(K.VEND,null);
  if(!vendedoresList){vendedoresList=VENDEDORES.map(n=>({id:uid(),nombre:n,sucursal:SUCURSALES[0],activo:true}));await Store.setJSON(K.VEND,vendedoresList);}
  usuarios=await Store.getJSON(K.USERS,null);
  if(!usuarios){usuarios=[
    {id:uid(),nombre:'Carla',usuario:'carla',pin:'1234',rol:'farmacia',sucursal:SUCURSALES[0],activo:true},
    {id:uid(),nombre:'Martín',usuario:'martin',pin:'1234',rol:'farmacia',sucursal:SUCURSALES[0],activo:true},
    {id:uid(),nombre:'Lucía',usuario:'lucia',pin:'1234',rol:'farmacia',sucursal:SUCURSALES[0],activo:true},
    {id:uid(),nombre:'Dr. Sosa',usuario:'lab',pin:'1234',rol:'laboratorio',sucursal:null,activo:true},
    {id:uid(),nombre:'Admin',usuario:'admin',pin:'1234',rol:'admin',sucursal:null,activo:true}
  ];await Store.setJSON(K.USERS,usuarios);}
  productos=await Store.getJSON(K.PRODS,[]);
  config=await Store.getJSON(K.CFG,null)||{nombre:'Farmacia Moreno 90',color:'#2F6933'};
  applyConfig();
}
function applyConfig(){if(config&&config.color)document.documentElement.style.setProperty('--green',config.color);}
function compress(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{const i=new Image();i.onload=()=>{const m=1400;let{width:w,height:h}=i;if(w>m||h>m){const s=m/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(i,0,0,w,h);res(c.toDataURL('image/jpeg',.82));};i.onerror=rej;i.src=r.result;};r.onerror=rej;r.readAsDataURL(file);});}
function medMat(m){const p=[];if(m.mn)p.push(`MN ${m.mn}`);if(m.mp)p.push(`MP ${m.mp}${m.provincia?' ('+m.provincia+')':''}`);return p.join(' / ')||'Sin matrícula';}

/* ===== ROLE / NAV ===== */
const ROLES={farmacia:'Farmacéutico',laboratorio:'Laboratorio',admin:'Administrador'};
const roleHome=r=>r==='farmacia'?'home':r==='laboratorio'?'bandeja':'cfg-suc';
const roleTok=r=>r==='farmacia'?'farma':r==='laboratorio'?'lab':'admin';
function renderLogin(){
  const logoEl=document.querySelector('.logoimg');const src=logoEl?logoEl.src:'';
  $('#login').innerHTML=`<div class="login-card">
    ${src?`<img src="${src}" alt="">`:''}
    <div class="lt">Iniciar sesión</div>
    <div class="ls">${esc(config.nombre||'Magistral')}</div>
    <label>Usuario</label>
    <div class="selwrap"><select class="sel" id="lg-user">${usuAct().map(u=>`<option value="${u.id}">${esc(u.nombre)} · ${ROLES[u.rol]}</option>`).join('')}</select></div>
    <label>PIN</label>
    <input id="lg-pin" type="password" inputmode="numeric" placeholder="••••" maxlength="8" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" onclick="doLogin()">Ingresar</button>
    <div class="login-hint"><b>Usuarios demo</b> · PIN <b>1234</b> para todos.<br>Carla / Martín / Lucía — Farmacéutico<br>Dr. Sosa — Laboratorio · Admin — Administrador</div>
    <div class="login-warn">Aviso: este login es solo de diseño. La seguridad real (datos cifrados y aislados) corre en el backend de Supabase, no en esta demo.</div>
  </div>`;
}
function doLogin(){
  const id=$('#lg-user').value, pin=($('#lg-pin').value||'').trim();
  const u=usuarios.find(x=>x.id===id&&x.activo);
  if(!u){toast('Usuario no válido');return;}
  if((u.pin||'')!==pin){toast('PIN incorrecto');return;}
  state.session=u; enterApp();
}
function enterApp(){
  const u=state.session; if(!u)return;
  state.role=roleTok(u.rol);
  state.vendedor=u.nombre; if(u.rol==='laboratorio')state.op=u.nombre;
  state.sucursal=u.sucursal||((sucAct()[0]||{}).nombre)||state.sucursal;
  state.filter='todos';
  $('#login').style.display='none';
  const app=document.querySelector('.app'); if(app)app.style.display='';
  nav(roleHome(u.rol));
  gsap.fromTo('.head',{y:-16,opacity:0},{y:0,opacity:1,duration:.4,ease:'power2.out'});
}
function logout(){
  state.session=null;
  const app=document.querySelector('.app'); if(app)app.style.display='none';

function setRole(r){state.role=r;state.filter='todos';nav(roleHome(r==='farma'?'farmacia':r==='lab'?'laboratorio':'admin'));}

  } else if(state.screen==='home'){
    ctx=`<div class="ctx"><div class="selrow">
      <div><label class="lbl">Sucursal</label><div class="selwrap"><select class="sel" onchange="state.sucursal=this.value">${sucAct().map(s=>`<option ${s.nombre===state.sucursal?'selected':''}>${esc(s.nombre)}</option>`).join('')}</select></div></div>
    </div></div>`;

  }
  $('#ctx').innerHTML=ctx;
  const R={home:renderHome,pedido:renderPedido,receta:renderReceta,envios:renderLista,bandeja:renderLista,medicos:renderMedicos,pacientes:renderPacientes,reportes:renderReportes,'cfg-suc':renderCfgSuc,'cfg-vend':renderCfgVend,'cfg-users':renderCfgUsers,'cfg-med':renderCfgMed,'cfg-farma':renderCfgFarma,'cfg-backup':renderCfgBackup};

function stepper(steps,cur){return `<div class="steps">${steps.map((s,i)=>{const cls=i<cur?'done':i===cur?'cur':'';const line=i<steps.length-1?`<div class="stepline ${i<cur?'done':''}"></div>`:'';return `<div class="step ${cls}"><div class="c">${i<cur?'✓':i+1}</div><div class="l">${s}</div></div>${line}`;}).join('')}</div>`;}

/* ===== WIZARD PEDIDO (3 pasos) ===== */
function startPedido(){state.wped={step:0,urgencia:null,items:[],obs:''};nav('pedido');}
function renderPedido(){
  const w=state.wped;
  let body='';
  if(w.step===0){
    body=`<div class="h1">¿Qué urgencia tiene este pedido?</div><div class="sub">Tocá una opción y pasás directo al paso siguiente.</div>
    ${Object.entries(URG).map(([k,u])=>`<div class="ucard" onclick="pedUrg('${k}')" style="cursor:pointer"><span class="d" style="background:${u.c}"></span><div><div class="tt" style="color:${u.c}">Urgencia ${u.l.toUpperCase()}</div><div class="ds">${u.d}</div></div><span class="ch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></span></div>`).join('')}`;
  } else if(w.step===1){
    const u=URG[w.urgencia];
    body=`<div class="urg-badge" style="color:${u.c};background:${u.c}18;border:1.5px solid ${u.c}40"><span style="width:10px;height:10px;border-radius:50%;background:${u.c};display:inline-block;flex-shrink:0"></span>Urgencia ${u.l}<button onclick="state.wped.step=0;render()" style="margin-left:auto;font-size:11.5px;font-weight:600;opacity:.7;color:var(--muted);background:none;border:none;padding:0;cursor:pointer">Cambiar</button></div>
    <div class="h1">Productos</div><div class="sub">Agregá los preparados a reponer.</div>
    ${w.items.length?`<div style="margin-bottom:14px">${w.items.map((it,i)=>`<div class="item"><div class="imain"><div class="tt">${esc(it.producto)}</div><div class="ss">${esc(it.presentacion||'')}${it.cantidad?' · x'+it.cantidad:''}</div></div><button class="xbtn" onclick="pedDel(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>`).join('')}</div>`:''}
    <div class="group">
      <div class="fld"><label class="lbl">Producto / Preparado</label><input class="inp" id="i-prod" placeholder="Ej: Minoxidil 5% loción" oninput="pedProdSugg()" autocomplete="off"><div id="prod-sugg" class="sugg-list" style="display:none"></div></div>
      <div class="fld"><div class="row2"><div><label class="lbl">Presentación</label><input class="inp" id="i-pres" placeholder="Frasco 100ml" autocomplete="off"></div><div><label class="lbl">Cantidad</label><input class="inp" id="i-cant" type="number" min="1" value="1"></div></div></div>
    </div>
    <button class="btn-add" onclick="pedAdd()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg> Agregar producto
    </button>
    <div class="group"><div class="fld"><label class="lbl">Observaciones (opcional)</label><textarea class="ta" id="i-obs" placeholder="Notas para el laboratorio…">${esc(w.obs)}</textarea></div></div>`;
  } else {
    const u=URG[w.urgencia];
    body=`<div class="h1">Confirmar pedido</div><div class="sub">Revisá antes de enviar.</div>
    <div class="group"><div class="fld"><span class="udot" style="color:${u.c}"><span style="width:11px;height:11px;border-radius:99px;background:${u.c};display:inline-block"></span>Urgencia ${u.l}</span></div>
    ${w.items.map(it=>`<div class="fld"><div class="tt" style="font-weight:700">${esc(it.producto)}</div><div class="ss" style="color:var(--gray);font-size:13px">${esc(it.presentacion||'')} · x${it.cantidad}</div></div>`).join('')}
    ${w.obs?`<div class="fld"><span class="lbl">Observaciones</span>${esc(w.obs)}</div>`:''}
    <div class="fld"><span class="lbl">Origen</span>${esc(state.sucursal)} · ${esc(state.vendedor)}</div></div>
    <button class="btn btn-primary" onclick="guardarPedido()">Enviar pedido al laboratorio</button>`;
  }
  const footer = w.step===1 ? `<button class="btn btn-primary" onclick="pedNext()">Continuar</button>` : '';
  return stepper(['Urgencia','Productos','Confirmar'],w.step)+body+footer;
}
function pedUrg(k){state.wped.urgencia=k;state.wped.step=1;render();}
function pedAdd(){const p=$('#i-prod').value.trim();if(!p){toast('Escribí el producto');return;}
  const pres=$('#i-pres').value.trim(),cant=+$('#i-cant').value||1;
  state.wped.items.push({producto:p,presentacion:pres,cantidad:cant});
  state.wped.obs=$('#i-obs').value.trim();
  const entry=p+(pres?' – '+pres:'');
  if(!productos.find(x=>x.toLowerCase()===entry.toLowerCase())){productos=[entry,...productos].slice(0,120);Store.setJSON(K.PRODS,productos);}
  const sugg=$('#prod-sugg');if(sugg)sugg.style.display='none';
  render();
}
function pedDel(i){state.wped.items.splice(i,1);render();}
function pedProdSugg(){
  const v=($('#i-prod')||{}).value||'';const q=v.trim().toLowerCase();
  const sugg=$('#prod-sugg');if(!sugg)return;
  if(q.length<2||!productos.length){sugg.style.display='none';return;}
  const matches=productos.filter(p=>p.toLowerCase().includes(q)).slice(0,7);
  if(!matches.length){sugg.style.display='none';return;}
  sugg.innerHTML=matches.map(p=>`<div class="sugg-item" data-v="${esc(p)}" onmousedown="pedPickProd(this)" ontouchstart="pedPickProd(this)">${esc(p)}</div>`).join('');
  sugg.style.display='block';
}
function pedPickProd(el){const inp=$('#i-prod');if(inp)inp.value=el.dataset.v;const sugg=$('#prod-sugg');if(sugg)sugg.style.display='none';}
function recProdSugg(){
  const v=($('#r-prod')||{}).value||'';const q=v.trim().toLowerCase();
  const sugg=$('#rec-prod-sugg');if(!sugg)return;
  if(q.length<2||!productos.length){sugg.style.display='none';return;}
  const matches=productos.filter(p=>p.toLowerCase().includes(q)).slice(0,7);
  if(!matches.length){sugg.style.display='none';return;}
  sugg.innerHTML=matches.map(p=>`<div class="sugg-item" data-v="${esc(p)}" onmousedown="recPickProd(this)" ontouchstart="recPickProd(this)">${esc(p)}</div>`).join('');
  sugg.style.display='block';
}
function recPickProd(el){const inp=$('#r-prod');if(inp)inp.value=el.dataset.v;const sugg=$('#rec-prod-sugg');if(sugg)sugg.style.display='none';}
function pedNext(){const w=state.wped;if(w.step===0){if(!w.urgencia){toast('Elegí la urgencia');return;}}if(w.step===1){if($('#i-obs'))w.obs=$('#i-obs').value.trim();if(!w.items.length){toast('Agregá al menos un producto');return;}}w.step++;render();}
async function guardarPedido(){const w=state.wped;
  const o={id:uid(),tipo:'reposicion',sucursal:state.sucursal,vendedor:state.vendedor,urgencia:w.urgencia,items:w.items,obs:w.obs,estado:'pendiente',precio:null,creado:Date.now(),hist:[{estado:'pendiente',ts:Date.now(),by:state.vendedor+' · '+state.sucursal}]};
  orders.unshift(o);await Store.setJSON(K.ORD,orders);toast('Pedido enviado al laboratorio ✓');nav('envios');}

/* ===== WIZARD RECETA (4 pasos) ===== */
function startReceta(){state.wrec={step:0,img:null,medicoId:null,medQ:'',pacQ:'',prod:'',pres:'',cant:1,obs:'',pNom:'',pDni:'',pTel:'',pOs:''};nav('receta');}
function renderReceta(){
  const w=state.wrec;let body='';
  if(w.step===0){
    body=`<div class="h1">Sacá foto a la receta</div><div class="sub">El laboratorio la usa para descifrar la letra del médico.</div>
    <div id="up"></div><input type="file" id="file" accept="image/*" capture="environment" class="hidden">
    <button class="btn btn-ghost" style="margin-top:12px" onclick="recSkip()">Continuar sin foto</button>`;
  } else if(w.step===1){
    const q=w.medQ.toLowerCase();const list=medicos.filter(m=>!q||m.nombre.toLowerCase().includes(q)||(m.mn||'').includes(q)||(m.mp||'').includes(q));
    body=`<div class="h1">¿Qué médico firma la receta?</div><div class="sub">Buscalo por matrícula o nombre. Si no está, cargalo y queda disponible para todas las sucursales.</div>
    <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Buscar por matrícula, apellido…" value="${esc(w.medQ)}" oninput="state.wrec.medQ=this.value;render()"></div>
    ${list.map(m=>`<div class="medc ${w.medicoId===m.id?'sel':''}" onclick="recPickMed('${m.id}')"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3v6L4.5 18a2 2 0 0 0 1.8 3h11.4a2 2 0 0 0 1.8-3L15 9V3M8 3h8"/></svg></div><div><div class="nm">${esc(m.nombre)}</div><div class="esp">${esc(m.esp||'')}</div><div class="mat"><span class="badge">${m.tipoMat}</span>${esc(medMat(m))}</div></div><span class="ch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg></span></div>`).join('')||'<div class="empty" style="padding:30px"><div class="t">Sin resultados</div><div>Cargá el médico nuevo abajo.</div></div>'}
    <button class="btn-add" onclick="recNuevoMed()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>Cargar médico nuevo</button>`;
  } else if(w.step===2){
    body=`<div class="h1">Datos del paciente</div><div class="sub">Si ya existe, se autocompleta al escribir el DNI o el nombre.</div>
    <div class="group">
      <div class="fld"><label class="lbl">DNI</label><input class="inp" id="p-dni" value="${esc(w.pDni)}" placeholder="30.123.456" oninput="recLookPac()"></div>
      <div class="fld"><label class="lbl">Nombre y apellido</label><input class="inp" id="p-nom" list="dlp" value="${esc(w.pNom)}" placeholder="Paciente" oninput="recLookPac('n')"><datalist id="dlp">${pacientes.map(p=>`<option value="${esc(p.nombre)}">`).join('')}</datalist><span id="p-f"></span></div>
      <div class="fld"><div class="row2"><div><label class="lbl">Teléfono</label><input class="inp" id="p-tel" value="${esc(w.pTel)}" placeholder="11 5555 5555"></div><div><label class="lbl">Obra social</label><input class="inp" id="p-os" value="${esc(w.pOs)}" placeholder="OSDE / particular"></div></div></div>
    </div>
    <button class="btn btn-primary" onclick="recNext2()">Continuar</button>`;
  } else {
    const m=medicos.find(x=>x.id===w.medicoId);
    body=`<div class="h1">Revisar y enviar</div><div class="sub">Confirmá los datos del envío.</div>
    ${w.img?`<img class="dimg" src="${w.img}">`:'<div class="reason" style="background:#FBF0DA;border-color:rgba(181,121,28,.3);color:#7a5410"><b>Sin foto</b>Se envía sin imagen de la receta.</div>'}
    <div class="group">
      <div class="fld"><label class="lbl">Preparado (opcional)</label><input class="inp" id="r-prod" value="${esc(w.prod)}" placeholder="Ej: Crema Clobetasol 0,05%" oninput="recProdSugg()" autocomplete="off"><div id="rec-prod-sugg" class="sugg-list" style="display:none"></div></div>
      <div class="fld"><div class="row2"><div><label class="lbl">Presentación</label><input class="inp" id="r-pres" value="${esc(w.pres)}" placeholder="Pote 30g"></div><div><label class="lbl">Cantidad</label><input class="inp" id="r-cant" type="number" min="1" value="${w.cant}"></div></div></div>
      <div class="fld"><label class="lbl">Médico</label><div style="font-weight:600">${m?esc(m.nombre)+' · '+esc(medMat(m)):'—'}</div></div>
      <div class="fld"><label class="lbl">Paciente</label><div style="font-weight:600">${esc(w.pNom||'—')}${w.pDni?' · DNI '+esc(w.pDni):''}</div></div>
      <div class="fld"><label class="lbl">Observaciones</label><textarea class="ta" id="r-obs" placeholder="Notas para el laboratorio…">${esc(w.obs)}</textarea></div>
    </div>
    <button class="btn btn-primary" onclick="guardarReceta()">Enviar al laboratorio</button>`;
  }
  return stepper(['Foto','Médico','Paciente','Revisar'],w.step)+body;
}
function wireReceta(){const w=state.wrec;if(w.step===0){renderUp();const f=$('#file');if(f)f.onchange=async e=>{const file=e.target.files[0];if(!file)return;toast('Procesando…');w.img=await compress(file);renderUp();setTimeout(()=>{w.step=1;render();},350);};}}
function renderUp(){const up=$('#up');if(!up)return;const w=state.wrec;
  if(w.img){up.innerHTML=`<div class="pv"><img src="${w.img}"><button class="rm" onclick="state.wrec.img=null;renderUp()">Quitar ✕</button></div><button class="btn btn-primary" style="margin-top:12px" onclick="state.wrec.step=1;render()">Continuar</button>`;}
  else up.innerHTML=`<div class="dz" onclick="document.getElementById('file').click()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg><div class="t">Tocá para sacar foto</div><div class="s">o adjuntar desde la galería</div></div>`;}
function recSkip(){state.wrec.img=null;state.wrec.step=1;render();}
function recPickMed(id){state.wrec.medicoId=id;state.wrec.step=2;render();}
function recNext2(){const w=state.wrec;w.pDni=$('#p-dni').value.trim();w.pNom=$('#p-nom').value.trim();w.pTel=$('#p-tel').value.trim();w.pOs=$('#p-os').value.trim();if(!w.pNom){toast('Falta el nombre del paciente');return;}w.step=3;render();}
function recLookPac(by){const w=state.wrec;const dni=$('#p-dni').value.trim(),nom=$('#p-nom').value.trim();let p=by==='n'?pacientes.find(x=>x.nombre.toLowerCase()===nom.toLowerCase()):pacientes.find(x=>x.dni&&x.dni===dni);const t=$('#p-f');if(p){$('#p-dni').value=p.dni||'';$('#p-nom').value=p.nombre;$('#p-tel').value=p.tel||'';$('#p-os').value=p.os||'';t.innerHTML=`<span class="found">✓ Paciente registrado</span>`;}else if(t)t.innerHTML='';}
async function guardarReceta(){const w=state.wrec;
  w.prod=$('#r-prod').value.trim();w.pres=$('#r-pres').value.trim();w.cant=+$('#r-cant').value||1;w.obs=$('#r-obs').value.trim();
  if(w.prod){const entry=w.prod+(w.pres?' – '+w.pres:'');if(!productos.find(x=>x.toLowerCase()===entry.toLowerCase())){productos=[entry,...productos].slice(0,120);await Store.setJSON(K.PRODS,productos);}}
  let pac=pacientes.find(x=>(w.pDni&&x.dni===w.pDni)||x.nombre.toLowerCase()===w.pNom.toLowerCase());
  if(!pac){pac={id:uid(),nombre:w.pNom,dni:w.pDni,tel:w.pTel,os:w.pOs,creado:Date.now()};pacientes.push(pac);}else{pac.dni=w.pDni||pac.dni;pac.tel=w.pTel||pac.tel;pac.os=w.pOs||pac.os;}
  const id=uid();
  const o={id,tipo:'receta',sucursal:state.sucursal,vendedor:state.vendedor,urgencia:'media',medicoId:w.medicoId,pacienteId:pac.id,prod:w.prod||'Receta magistral',pres:w.pres,cant:w.cant,obs:w.obs,estado:'pendiente',precio:null,creado:Date.now(),hist:[{estado:'pendiente',ts:Date.now(),by:state.vendedor+' · '+state.sucursal}]};
  orders.unshift(o);
  if(w.img)await Store.set(K.IMG(id),w.img);
  await Store.setJSON(K.PAC,pacientes);await Store.setJSON(K.ORD,orders);
  toast('Receta enviada al laboratorio ✓');nav('envios');}

/* médico: alta / edición */

async function saveMed(){const nom=$('#nm-nom').value.trim();if(!nom){toast('Falta el nombre');return;};
  const mn=$('#nm-mn').value.trim(),mp=$('#nm-mp').value.trim();
  const data={nombre:nom,esp:$('#nm-esp').value.trim(),mn,mp,provincia:mp?$('#nm-prov').value:'',tipoMat:mn&&mp?'Ambas':mp?'MP':'MN'};
  let m;if(_medEdit){m=medicos.find(x=>x.id===_medEdit);Object.assign(m,data);}else{m={id:uid(),...data,creado:Date.now()};medicos.push(m);}
  await Store.setJSON(K.MED,medicos);closeDw();toast(_medEdit?'Médico actualizado ✓':'Médico cargado ✓');
  if(state.screen==='receta'&&!_medEdit){state.wrec.medicoId=m.id;state.wrec.step=2;}render();}

async function _encryptBk(json, pass) {
  const enc = new TextEncoder();
  const km  = await crypto.subtle.importKey('raw', enc.encode(pass), {name:'PBKDF2'}, false, ['deriveKey']);
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:150000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['encrypt']
  );
  const ct   = await crypto.subtle.encrypt({name:'AES-GCM', iv}, key, enc.encode(json));
  const buf  = new Uint8Array(4 + 16 + 12 + ct.byteLength);
  // header: magic 0xMGB1 (4 bytes) + salt + iv + ciphertext
  buf.set([0x4D,0x47,0x42,0x31]);
  buf.set(salt, 4); buf.set(iv, 20); buf.set(new Uint8Array(ct), 32);
  return btoa(String.fromCharCode(...buf));
}
async function _decryptBk(b64, pass) {
  const bytes = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const magic = bytes.slice(0,4);
  if(magic[0]!==0x4D||magic[1]!==0x47||magic[2]!==0x42||magic[3]!==0x31) throw new Error('Archivo no reconocido o corrupto');
  const salt=bytes.slice(4,20), iv=bytes.slice(20,32), ct=bytes.slice(32);
  const enc=new TextEncoder();
  const km  = await crypto.subtle.importKey('raw', enc.encode(pass), {name:'PBKDF2'}, false, ['deriveKey']);
  const key  = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:150000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']
  );
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ct);
  return new TextDecoder().decode(plain);
}

async function exportarBackup(conFotos) {
  const pass = ($('#bk-pass')||{}).value||'';
  if(!pass) {
    if(!confirm('⚠️ Vas a exportar SIN cifrado.\nEl archivo contendrá datos de pacientes en texto plano.\n¿Continuar igual?')) return;
  }
  const ts = new Date().toISOString();
  const bk = {
    version:'1.0', app:'Magistral', timestamp:ts,
    farmacia:config.nombre||'Magistral',
    data:{orders, pacientes, medicos, sucursalesList, vendedoresList, usuarios, productos, config}
  };
  if(conFotos) {
    bk.imagenes = {};
    for(const o of orders.filter(x=>x.tipo==='receta')) {
      const v = await Store.get(K.IMG(o.id));
      if(v) bk.imagenes[K.IMG(o.id)] = v;
    }
  }
  const json = JSON.stringify(bk);
  let blob, ext;
  if(pass) {
    toast('Cifrando…');
    const enc = await _encryptBk(json, pass);
    blob = new Blob([enc], {type:'application/octet-stream'});
    ext  = 'mgbak';
  } else {
    blob = new Blob([json], {type:'application/json'});
    ext  = 'json';
  }
  const fname = `magistral_backup_${ts.slice(0,16).replace('T','_').replace(':','h')}min.${ext}`;
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=fname; a.click(); URL.revokeObjectURL(url);
  // Save last backup time
  config._lastBackup = Date.now();
  await Store.setJSON(K.CFG, config);
  toast(`Backup exportado ✓  (${pass?'cifrado AES-256':'SIN cifrado'})`);
  render();
}

async function importarBackup(file) {
  if(!file) return;
  const pass = ($('#bk-pass')||{}).value||'';
  const isEnc = file.name.endsWith('.mgbak');
  if(isEnc && !pass) { toast('Ingresá la contraseña para descifrar'); return; }
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      let json = e.target.result;
      if(isEnc) {
        toast('Descifrando…');
        try { json = await _decryptBk(json, pass); }
        catch(er) { toast('Contraseña incorrecta o archivo corrupto'); return; }
      }
      const bk = JSON.parse(json);
      if(!bk.version||!bk.data) { toast('Archivo de backup inválido'); return; }
      const resumen = `Farmacia: ${bk.farmacia}\nFecha: ${new Date(bk.timestamp).toLocaleString('es-AR')}\nPedidos: ${(bk.data.orders||[]).length} · Pacientes: ${(bk.data.pacientes||[]).length}\n\n¿Restaurar? Se sobreescribirán todos los datos actuales.`;
      if(!confirm(resumen)) return;
      orders         = bk.data.orders         || [];
      pacientes      = bk.data.pacientes      || [];
      medicos        = bk.data.medicos        || [];
      sucursalesList = bk.data.sucursalesList || [];
      vendedoresList = bk.data.vendedoresList || [];
      usuarios       = bk.data.usuarios       || [];
      productos      = bk.data.productos      || [];
      config         = {...(bk.data.config||{}), _lastBackup: bk.data.config?._lastBackup};
      await Store.setJSON(K.ORD,  orders);
      await Store.setJSON(K.PAC,  pacientes);
      await Store.setJSON(K.MED,  medicos);
      await Store.setJSON(K.SUC,  sucursalesList);
      await Store.setJSON(K.VEND, vendedoresList);
      await Store.setJSON(K.USERS,usuarios);
      await Store.setJSON(K.PRODS,productos);
      await Store.setJSON(K.CFG,  config);
      if(bk.imagenes) {
        for(const [k,v] of Object.entries(bk.imagenes)) await Store.set(k,v);
      }
      applyConfig();
      toast(`Backup restaurado ✓ — ${orders.length} pedidos, ${pacientes.length} pacientes`);
      render();
    } catch(er) { toast('Error al restaurar: '+er.message); }
  };
  if(isEnc) reader.readAsText(file); else reader.readAsText(file);
}

    const rs=orders.filter(o=>o.tipo==='receta'&&o.medicoId===state.rep.medId&&inRange(o.creado));
    return `<div class="group" style="margin-top:16px;border:1.5px solid var(--green);border-radius:14px;padding:14px 16px">
      <div style="font-weight:700;font-size:15px;margin-bottom:4px">${esc(rm?rm.nombre:'Médico')}</div>
      <div class="mat" style="margin-bottom:12px">${esc(rm?medMat(rm):'')}</div>
      <div class="secl">${rs.length} receta${rs.length!==1?'s':''} en el período</div>
      ${rs.length?rs.map(o=>{const pac=pacientes.find(x=>x.id===o.pacienteId)||{};
        return `<div class="item" data-id="${o.id}" onclick="toggleOrder('${o.id}')">
          <div class="imain"><div class="tt">${esc(codigo(o))} · ${esc(o.prod||'—')}</div>
          <div class="ss">${esc(pac.nombre||'—')} · ${fmtDate(o.creado)}</div></div>
          <span class="chip ${o.estado}">${ESTADOS[o.estado]}</span></div>
          ${state.openId===o.id?`<div class="acc-detail" id="od-${o.id}">${orderDetailHTML(o.id)}</div>`:''}`;
      }).join(''):'<div class="ss">Sin recetas en el período.</div>'}
    </div>`;
  })():''}`;
}
function inRange(ts){const d=new Date(ts);if(state.rep.desde&&d<new Date(state.rep.desde))return false;if(state.rep.hasta&&d>new Date(state.rep.hasta+'T23:59:59'))return false;return true;}
function verMedico(id){const m=medicos.find(x=>x.id===id);const rs=orders.filter(o=>o.tipo==='receta'&&o.medicoId===id&&inRange(o.creado));
  $('#dwc').innerHTML=`<div class="dwh"><h3>${esc(m.nombre)}</h3><button class="xbtn" onclick="closeDw()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
  <div class="dwb"><div class="mat" style="margin-bottom:14px"><span class="badge">${m.tipoMat}</span>${esc(medMat(m))} · ${esc(m.esp||'')}</div>
  <div class="secl">${rs.length} receta${rs.length!==1?'s':''} en el período</div>
  ${rs.map(o=>{const p=pacientes.find(x=>x.id===o.pacienteId)||{};return `<div class="item" onclick="openOrder('${o.id}')"><div class="imain"><div class="tt">${esc(codigo(o))} · ${esc(o.prod)}</div><div class="ss">${esc(p.nombre||'—')} · ${fmtDate(o.creado)}</div></div><span class="chip ${o.estado}">${ESTADOS[o.estado]}</span></div>`;}).join('')||'<div class="ss">Sin recetas.</div>'}</div>`;
  $('#ov').classList.add('on');gsap.to('#dw',{y:0,x:'-50%',duration:.4,ease:'power3.out'});}
function expReporte(){const recetas=orders.filter(o=>o.tipo==='receta'&&inRange(o.creado));
  const byMed={};recetas.forEach(o=>{const k=o.medicoId||'sin';byMed[k]=(byMed[k]||0)+1;});
  const rows=Object.entries(byMed).map(([id,n])=>{const m=medicos.find(x=>x.id===id);return{medico:m?m.nombre:'Sin médico',matricula:m?medMat(m):'',especialidad:m?m.esp:'',recetas:n};}).sort((a,b)=>b.recetas-a.recetas);
  const cols=Object.keys(rows[0]||{medico:''});const q=v=>{v=(v==null?'':String(v));return /[",\n;]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv=[cols.join(';'),...rows.map(r=>cols.map(c=>q(r[c])).join(';'))].join('\n');
  const u=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}));const a=document.createElement('a');a.href=u;a.download='reporte_medicos.csv';a.click();toast('Reporte exportado ✓');}

/* ===== INIT ===== */
(async()=>{await loadAll();state.sucursal=(sucAct()[0]||{}).nombre||state.sucursal;const app=document.querySelector('.app');if(app)app.style.display='none';renderLogin();gsap.fromTo('#login .login-card',{y:18,opacity:0},{y:0,opacity:1,duration:.45,ease:'power3.out'});})();
</script>
